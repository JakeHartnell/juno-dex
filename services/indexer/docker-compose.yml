services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: astroport_indexer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - indexer-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d astroport_indexer"]
      interval: 5s
      timeout: 5s
      retries: 10

  indexer:
    build: .
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/astroport_indexer
    profiles: ["indexer"]

volumes:
  indexer-postgres:
