name: Code coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  code-coverage:
    name: Code coverage
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git/checkouts
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0

      - name: Install cargo-tarpaulin
        run: cargo install --locked cargo-tarpaulin@0.32.0 || true

      - name: Run cargo-tarpaulin
        run: cargo tarpaulin --out Xml

      # Codecov upload removed for the Juno fork (was tied to astroport-fi's
      # CODECOV_TOKEN secret). Coverage report is generated locally as XML
      # and surfaced via the workflow logs. Re-add when this fork has its
      # own Codecov project + token.
