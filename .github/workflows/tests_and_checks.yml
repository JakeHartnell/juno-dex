name: Contract tests and checks

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  test_and_check:
    name: Test and check
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout sources
        uses: actions/checkout@v4
      - uses: actions/cache@v4
        if: always()
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/git/checkouts
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.81.0
          components: rustfmt, clippy

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

      - name: Run cargo clippy
        run: cargo clippy -- -D warnings -A unexpected_cfgs

      # `--features tests-tube` was for osmosis-test-tube integration tests;
      # the stripped workspace no longer carries that surface.
      - name: Run tests
        run: cargo test --workspace --no-fail-fast --locked
        env:
          RUST_BACKTRACE: 1

      - name: Generate and check schemas
        run: |
          $GITHUB_WORKSPACE/scripts/build_schemas.sh
          git add -A $GITHUB_WORKSPACE/schemas # consider new contract schemas
          git diff-index --cached HEAD --exit-code --
